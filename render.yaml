services:
  - type: web
    name: jto-playground-docx
    runtime: node
    plan: starter
    buildCommand: npm i -g pnpm@9.15.9 && pnpm install && pnpm build
    startCommand: node packages/jto/dist/cli.js docx dev --host 0.0.0.0 --port 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_ENABLED
        value: "false"
      - key: VITE_AI_ENABLED
        value: "false"
      - key: ENABLE_COREPACK
        value: "1"
      - key: NODE_VERSION
        value: "20"
    healthCheckPath: /health

  - type: web
    name: jto-playground-pptx
    runtime: node
    plan: starter
    buildCommand: npm i -g pnpm@9.15.9 && pnpm install && pnpm build
    startCommand: node packages/jto/dist/cli.js pptx dev --host 0.0.0.0 --port 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_ENABLED
        value: "false"
      - key: VITE_AI_ENABLED
        value: "false"
      - key: ENABLE_COREPACK
        value: "1"
      - key: NODE_VERSION
        value: "20"
    healthCheckPath: /health
